name: Deploy PR to minlibmap_dev

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Push index.html to minlibmap_dev
        env:
          TOKEN: ${{ secrets.DEV_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/esakkas24/minlibmap_dev.git /tmp/dev
          cp index.html /tmp/dev/
          cd /tmp/dev
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add index.html
          git diff --cached --quiet || git commit -m "Deploy PR #${{ github.event.pull_request.number }} (${{ github.head_ref }})"
          git push
